AWSTemplateFormatVersion: '2010-09-09'
Description: Stack 2 - EC2 Estatica con Elastic IP (kevin-arley)

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id

Resources:
  EC2Static:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0cca150d127c2216f # Amazon Linux 2023 us-east-1
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !ImportValue SG-EC2-Kevin-Arley
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Instancia Estatica - kevin-arley</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: ec2-static-kevin-arley

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: eip-kevin-arley

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Static
      EIP: !Ref ElasticIP

Outputs:
  InstanceIP:
    Description: IP Publica Estatica de la EC2
    Value: !Ref ElasticIP
