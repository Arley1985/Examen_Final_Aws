AWSTemplateFormatVersion: '2010-09-09'
Description: 'Archivo 2 - Instancia EC2 Estática Automática'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64'

  StudentPrefix:
    Type: String
    Default: Kevin-Arley

Resources:
  StaticEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: !Ref LatestAmiId
      SecurityGroupIds:
        - !ImportValue 
          Name: !Sub "${StudentPrefix}-EC2SecurityGroupId"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install httpd -y
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Examen Final Cloud Computing - Servidor Estatico de ${StudentPrefix}</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: !Sub "EC2-${StudentPrefix}"

  MyElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "EIP-${StudentPrefix}"

  IPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt MyElasticIP.AllocationId
      InstanceId: !Ref StaticEC2Instance

Outputs:
  PublicIP:
    Value: !Ref MyElasticIP