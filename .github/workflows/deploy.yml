name: Deploy Infrastructures

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Obtener Red por defecto
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID --query 'Subnets[0:2].SubnetId' --output text | tr '\t' ',')
          SUBNET_1=$(echo $SUBNETS | cut -d',' -f1)
          echo "VPC_ID=$VPC_ID" >> $GITHUB_ENV
          echo "SUBNETS=$SUBNETS" >> $GITHUB_ENV
          echo "SUBNET_1=$SUBNET_1" >> $GITHUB_ENV

      - name: Deploy Security Stack
        run: |
          aws cloudformation deploy \
          --template-file templates/security.yaml \
          --stack-name SecurityGroups-Stack \
          --parameter-overrides VpcId=${{ env.VPC_ID }}

      - name: Deploy EC2 Stack
        run: |
          aws cloudformation deploy \
          --template-file templates/ec2.yaml \
          --stack-name EC2Static-Stack \
          --parameter-overrides SubnetId=${{ env.SUBNET_1 }}

      - name: Deploy ALB-ASG Stack
        run: |
          aws cloudformation deploy \
          --template-file templates/alb-asg.yaml \
          --stack-name ALB-ASG-Stack \
          --parameter-overrides VpcId=${{ env.VPC_ID }} Subnets=${{ env.SUBNETS }}

      - name: Deploy Automation Stack
        run: |
          aws cloudformation deploy \
          --template-file templates/automation.yaml \
          --stack-name Automation-Stack
